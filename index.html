<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Inti Raymi Restaurante — menú digital, delivery y recojo en local en Calama, Chile." />
    <title>Inti Raymi Restaurante — Menú y pedidos en línea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/landing.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Inti Raymi Restaurante",
        "image": "https://assets.olaclick.app/companies/logos/8df7b0fd-1d49-4b22-ba41-15b522aa5166.png",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Antofagasta 2088, 1390714 Calama, Antofagasta, Chile",
          "addressCountry": "Chile"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": -22.4590882,
          "longitude": -68.9268891
        },
        "telephone": "+56552741723",
        "servesCuisine": "Delivery",
        "priceRange": "$$"
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" aria-label="Inicio Inti Raymi">
          <img
            class="brand-logo brand-logo--mobile"
            src="assets/logo-placeholder.svg"
            id="home-logo-mobile"
            width="64"
            height="64"
            alt="Logo Inti Raymi Restaurante"
          />
        </a>
        <div class="header-actions">
          <div id="status-pill" class="status-pill" data-open="false" role="status" aria-live="polite">
            <span class="status-dot" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 20a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm0-18a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"
                />
              </svg>
            </span>
            <span data-status-label>Cerrado</span>
          </div>
          <a class="btn btn--primary" href="products.html">Pedir</a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-inner hero-grid">
          <div>
            <img
              class="desktop-logo"
              src="assets/logo-placeholder.svg"
              id="home-logo-hero"
              width="104"
              height="104"
              alt=""
            />
            <h1 id="hero-title" class="hero-title">Bienvenid@s Inti Raymi Menu</h1>
            <p class="hero-lead">Delivery</p>

            <div class="badges" aria-label="Tipos de servicio">
              <div class="badge">
                <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                  <path d="M4 10h16v8H4zM7 10V7a5 5 0 0 1 10 0v3" />
                  <path d="M9 14h6" />
                </svg>
                <span>Recojo en local</span>
              </div>
              <span class="divider-v" aria-hidden="true"></span>
              <div class="badge">
                <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                  <path d="M3 7h4l2 9h10l2-6H8" />
                  <circle cx="9.5" cy="19" r="1.2" fill="currentColor" stroke="none" />
                  <circle cx="17.5" cy="19" r="1.2" fill="currentColor" stroke="none" />
                </svg>
                <span>A domicilio</span>
              </div>
            </div>

            <a
              class="address-link"
              href="https://www.google.com/maps/search/?api=1&amp;query=-22.4590882,-68.9268891"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"
                />
              </svg>
              <span>Antofagasta 2088, 1390714 Calama, Antofagasta, Chile</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M14 3v2h3.59L7.76 14.83 9.17 16.24 19 6.41V10h2V3m-2 16H5V5h7V3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-7h-2v7z"
                />
              </svg>
            </a>
          </div>

          <div class="cta-wrap">
            <a class="btn btn--primary btn--hero" href="products.html">Ver menú</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <nav class="footer-links" aria-label="Enlaces pie de página">
          <a href="products.html">Menú digital de Inti Raymi Restaurante</a>
          <a href="info.html">Tipos de servicio y horarios</a>
          <button type="button">Reportar algo</button>
        </nav>
      </div>
    </footer>

    <script src="js/landing.js" defer></script>
  </body>
</html>
